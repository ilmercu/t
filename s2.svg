<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg">

  <!-- Card background -->
  <rect x="40" y="20" width="600" height="220" rx="16"
        fill="#FFFBEB" stroke="#FCD34D" stroke-width="1"/>

  <!-- Icon circle -->
  <circle cx="340" cy="72" r="28" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- Warning triangle -->
  <polygon points="340,50 362,84 318,84" fill="#D97706"/>
  <rect x="337.5" y="58" width="5" height="14" rx="2" fill="#FEF3C7"/>
  <circle cx="340" cy="78" r="2.5" fill="#FEF3C7"/>

  <!-- Title -->
  <text x="340" y="126" text-anchor="middle"
        font-family="sans-serif" font-size="19" font-weight="500" fill="#92400E">
    There were problems loading the resource
  </text>

  <!-- Separator -->
  <line x1="120" y1="142" x2="560" y2="142" stroke="#FDE68A" stroke-width="1"/>

  <!-- Instruction -->
  <text x="340" y="170" text-anchor="middle"
        font-family="sans-serif" font-size="14" fill="#6B7280">
    Please contact your collaborator by email:
  </text>

  <!-- Email badge (clickable) -->
  <a href="mailto:test@example.com">
    <rect x="218" y="185" width="244" height="36" rx="8"
          fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" cursor="pointer"/>
    <!-- Mail icon -->
    <rect x="230" y="196" width="16" height="12" rx="2"
          fill="none" stroke="#D97706" stroke-width="1.2"/>
    <polyline points="230,196 238,204 246,196"
              fill="none" stroke="#D97706" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Email text -->
    <text x="334" y="208" text-anchor="middle"
          font-family="monospace" font-size="14" font-weight="500"
          fill="#D97706" text-decoration="underline" cursor="pointer">
      test@example.com
    </text>
  </a>

</svg>
